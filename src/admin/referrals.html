<!DOCTYPE html>
<html lang="fr" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin DocMaster — Parrainages</title>
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@500;600;700;800&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4/dist/full.min.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* ── DocMaster theme overrides ── */
        [data-theme="light"] {
            --color-primary: oklch(73.5% 0.155 59.5);       /* #F5A64B */
            --color-primary-content: oklch(98% 0 0);
            --color-base-100: #F4EFE6;
            --color-base-200: #EAE3D8;
            --color-base-300: #DDD5C8;
            --color-base-content: #1a1a1a;
        }

        body { font-family: 'Poppins', sans-serif; }
        .font-bricolage { font-family: 'Bricolage Grotesque', sans-serif; }

        /* ── Custom Sidebar ── */
        .admin-sidebar {
            width: 260px;
            background: #1e3a2f;
            color: white;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            z-index: 100;
        }

        .sidebar-header {
            padding: 1.5rem;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        /* Override DaisyUI menu for dark sidebar context */
        .admin-sidebar .menu li > a {
            color: rgba(255,255,255,0.6);
            font-size: 0.8125rem;
            font-weight: 500;
            border-radius: 8px;
            gap: 10px;
            transition: all 0.15s;
        }
        .admin-sidebar .menu li > a:hover {
            background: rgba(255,255,255,0.06);
            color: white;
        }
        .admin-sidebar .menu li > a.active {
            background: #F5A64B;
            color: white;
        }
        .admin-sidebar .menu li > a.text-red-400 {
            color: #f87171;
        }
        .admin-sidebar .menu li > a.text-red-400:hover {
            background: rgba(248,113,113,0.1);
            color: #fca5a5;
        }

        /* Scrollbar */
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #DDD5C8; border-radius: 10px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }

    </style>
</head>
<body class="flex h-screen overflow-hidden bg-base-100">
  <script type="module" src="/js/utils/ui-helpers.js"></script>

    <!-- ── Sidebar ── -->
    <aside class="admin-sidebar">
        <div class="sidebar-header flex items-center gap-3">
            <img src="../assets/images/logo.png" alt="Logo" class="h-8 w-auto">
            <span class="font-bricolage font-extrabold text-lg tracking-tight text-white">Admin Panel</span>
        </div>

        <nav class="flex-1 p-3 flex flex-col">
            <ul class="menu gap-1 flex-1">
                <li><a href="dashboard.html"><i class="fa-solid fa-gauge-high w-4"></i> Vue d'ensemble</a></li>
                <li><a href="users.html"><i class="fa-solid fa-users w-4"></i> Utilisateurs</a></li>
                <li><a href="document-types.html"><i class="fa-solid fa-file-invoice w-4"></i> Types de Documents</a></li>
                <li><a href="subscriptions.html"><i class="fa-solid fa-crown w-4"></i> Abonnements</a></li>
                <li><a href="transactions.html"><i class="fa-solid fa-receipt w-4"></i> Transactions</a></li>
                <li><a href="referrals.html" class="active"><i class="fa-solid fa-user-friends w-4"></i> Parrainages</a></li>
                <li><a href="declarations.html"><i class="fa-solid fa-folder-open w-4"></i> Déclarations</a></li>
                <li><a href="settings.html"><i class="fa-solid fa-gear w-4"></i> Paramètres</a></li>
            </ul>

            <div class="border-t border-white/10 pt-3 mt-3">
                <ul class="menu gap-1">
                    <li><a href="../dashboard.html"><i class="fa-solid fa-arrow-left w-4"></i> Retour au site</a></li>
                    <li><a href="#" class="text-red-400"><i class="fa-solid fa-right-from-bracket w-4"></i> Déconnexion</a></li>
                </ul>
            </div>
        </nav>
    </aside>

    <!-- ── Main ── -->
    <div class="flex-1 flex flex-col overflow-hidden">

        <!-- Top bar -->
        <div class="navbar bg-white border-b border-base-200 px-8 min-h-[64px] flex-shrink-0">
            <div class="flex-1">
                <h2 class="font-bricolage text-xl font-extrabold tracking-tight">Gestion des Parrainages</h2>
            </div>
            <div class="flex-none gap-3">
                <div class="avatar placeholder">
                    <div class="bg-base-200 text-base-content rounded-full w-10 border-2 border-white shadow-sm">
                        <span class="text-xs font-bold">AD</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Scrollable content -->
        <div class="flex-1 overflow-y-auto p-8 custom-scroll">

            <div class="flex justify-between items-center mb-6">
                <h3 class="font-bricolage text-lg font-bold">Tous les parrainages</h3>
                <div class="flex gap-2">
                    <input type="text" id="searchInput" placeholder="Rechercher par nom..." class="input input-sm input-bordered w-64 bg-white" />
                    <button class="btn btn-sm btn-primary text-white" onclick="loadReferrals()"><i class="fa-solid fa-rotate-right"></i> Actualiser</button>
                </div>
            </div>

            <!-- Table -->
            <div class="bg-white border border-base-200 rounded-2xl overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="table w-full">
                        <thead class="bg-base-200/50 text-base-content">
                            <tr>
                                <th>Date</th>
                                <th>Parrain</th>
                                <th>Filleul</th>
                                <th>Statut</th>
                                <th>Points Gagnés</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="referralsTableBody">
                            <tr>
                                <td colspan="6" class="text-center py-8 text-base-content/60">
                                    <span class="loading loading-spinner loading-md text-primary"></span>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

        </div>
    </div>

    <!-- Modals or scripts -->
    <script type="module">
        import { adminService } from '../js/services/admin.js';

        window.loadReferrals = async function() {
            try {
                const tbody = document.getElementById('referralsTableBody');
                tbody.innerHTML = '<tr><td colspan="6" class="text-center py-8"><span class="loading loading-spinner loading-md text-primary"></span></td></tr>';
                
                const data = await adminService.getAllReferrals();
                
                if (!data || data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6" class="text-center py-8 text-base-content/60">Aucun parrainage trouvé.</td></tr>';
                    return;
                }

                renderTable(data);

                // Add search listener
                document.getElementById('searchInput').addEventListener('input', (e) => {
                    const search = e.target.value.toLowerCase();
                    const filtered = data.filter(r => 
                        (r.parrain_nom + ' ' + r.parrain_prenom).toLowerCase().includes(search) ||
                        (r.filleul_nom + ' ' + r.filleul_prenom).toLowerCase().includes(search)
                    );
                    renderTable(filtered);
                });

            } catch (error) {
                console.error('Erreur lors du chargement des parrainages', error);
                document.getElementById('referralsTableBody').innerHTML = '<tr><td colspan="6" class="text-center py-8 text-red-500">Erreur lors du chargement des données.</td></tr>';
            }
        };

        window.rewardReferral = async function(id) {
            if (!confirm('Voulez-vous vraiment attribuer la récompense à ce parrain ?')) return;
            
            try {
                const result = await adminService.rewardReferral(id);
                if (result.success) {
                    alert('Succès: La récompense a été attribuée.');
                    loadReferrals();
                } else {
                    alert('Erreur: ' + (result.error || 'Erreur inconnue'));
                }
            } catch (error) {
                alert('Erreur: ' + error.message);
            }
        };

        function renderTable(data) {
            const tbody = document.getElementById('referralsTableBody');
            tbody.innerHTML = data.map(r => `
                <tr class="hover">
                    <td class="whitespace-nowrap">${new Date(r.created_at).toLocaleDateString('fr-FR')}</td>
                    <td>
                        <div class="font-semibold text-sm">${r.parrain_prenom || ''} ${r.parrain_nom || ''}</div>
                        <div class="text-xs text-base-content/60">${r.parrain_email}</div>
                    </td>
                    <td>
                        <div class="font-semibold text-sm">${r.filleul_prenom || ''} ${r.filleul_nom || ''}</div>
                        <div class="text-xs text-base-content/60">${r.filleul_email}</div>
                    </td>
                    <td>
                        <span class="badge ${r.recompense_attribuee ? 'badge-success' : 'badge-warning'} badge-sm">
                            ${r.recompense_attribuee ? 'Récompensé' : 'En attente'}
                        </span>
                    </td>
                    <td class="font-bricolage font-bold text-primary">+${r.points_gagnes || 500} pts</td>
                    <td>
                        <div class="flex gap-1">
                            ${!r.recompense_attribuee ? 
                                `<button class="btn btn-xs btn-primary text-white" onclick="rewardReferral('${r.id}')">Récompenser</button>` : 
                                `<button class="btn btn-xs btn-disabled">Récompensé</button>`
                            }
                            <button class="btn btn-xs btn-ghost text-primary" onclick="alert('Détails: Parrainage ID ${r.id}')">Détails</button>
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        window.loadReferrals();
    </script>
</body>
</html>
